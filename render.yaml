services:
  - type: web
    name: weather-app-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        value: https://weather-app.vercel.app
